<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: ink dark rounded square -->
  <rect width="32" height="32" rx="7" fill="#0E1A0E"/>

  <!-- Leaf shape — lime, pointing up-right -->
  <path d="M8 24
           C8 24, 8 10, 18 8
           C26 6, 26 6, 24 14
           C22 20, 14 22, 8 24Z"
        fill="#7CC542"/>

  <!-- Leaf vein -->
  <path d="M8 24 C12 18, 18 13, 24 8"
        stroke="#1B4D25" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Stem -->
  <path d="M8 24 C8 26, 10 27, 12 28"
        stroke="#5A9E2F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
